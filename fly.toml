# fly.toml app configuration file generated for z-download-api on 2026-04-11T18:40:54-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'z-download-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.api'

[env]
  DOWNLOAD_API_HOST = '0.0.0.0'
  DOWNLOAD_API_PORT = '3001'
  YT_DLP_BINARY_PATH = '/usr/local/bin/yt-dlp'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
